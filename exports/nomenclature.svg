<svg baseProfile="full" height="400px" version="1.1" width="900px" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs /><text font-family="Arial" font-size="14px" font-weight="bold" text-anchor="middle" x="450.0" y="25">NOMENCLATURE - MECANISME 4-BAR LINKAGE</text><text fill="gray" font-family="Arial" font-size="10px" text-anchor="middle" x="450.0" y="42">Quantites pour un mecanisme complet (haut + bas)</text><text font-family="Arial" font-size="9px" font-weight="bold" text-anchor="start" x="30" y="65">Ref</text><text font-family="Arial" font-size="9px" font-weight="bold" text-anchor="start" x="80" y="65">Description</text><text font-family="Arial" font-size="9px" font-weight="bold" text-anchor="start" x="380" y="65">Qte</text><text font-family="Arial" font-size="9px" font-weight="bold" text-anchor="start" x="420" y="65">Materiel</text><text font-family="Arial" font-size="9px" font-weight="bold" text-anchor="start" x="560" y="65">Dimensions</text><line stroke="black" stroke-width="1" x1="20" x2="880" y1="70" y2="70" /><text font-family="Arial" font-size="8px" text-anchor="start" x="30" y="90">PM</text><text font-family="Arial" font-size="8px" text-anchor="start" x="80" y="90">Platine murale combinee (A+B)</text><text font-family="Arial" font-size="8px" text-anchor="start" x="380" y="90">2</text><text font-family="Arial" font-size="8px" text-anchor="start" x="420" y="90">Tole S235 5mm pliee + 1 soudure</text><text font-family="Arial" font-size="8px" text-anchor="start" x="560" y="90">Patron deplie: 138x408mm</text><text font-family="Arial" font-size="8px" text-anchor="start" x="30" y="110">PP</text><text font-family="Arial" font-size="8px" text-anchor="start" x="80" y="110">Platine porte combinee (a+b)</text><text font-family="Arial" font-size="8px" text-anchor="start" x="380" y="110">2</text><text font-family="Arial" font-size="8px" text-anchor="start" x="420" y="110">Tole S235 5mm pliee + 1 soudure</text><text font-family="Arial" font-size="8px" text-anchor="start" x="560" y="110">Patron deplie: 182x433mm</text><text font-family="Arial" font-size="8px" text-anchor="start" x="30" y="130">BR1</text><text font-family="Arial" font-size="8px" text-anchor="start" x="80" y="130">Bras 1 long (A-&gt;a)</text><text font-family="Arial" font-size="8px" text-anchor="start" x="380" y="130">2</text><text font-family="Arial" font-size="8px" text-anchor="start" x="420" y="130">Tube rect 40x25x3</text><text font-family="Arial" font-size="8px" text-anchor="start" x="560" y="130">L entraxe = 652mm</text><text font-family="Arial" font-size="8px" text-anchor="start" x="30" y="150">BR2</text><text font-family="Arial" font-size="8px" text-anchor="start" x="80" y="150">Bras 2 court (B-&gt;b)</text><text font-family="Arial" font-size="8px" text-anchor="start" x="380" y="150">2</text><text font-family="Arial" font-size="8px" text-anchor="start" x="420" y="150">Tube rect 40x25x3</text><text font-family="Arial" font-size="8px" text-anchor="start" x="560" y="150">L entraxe = 496mm</text><text font-family="Arial" font-size="8px" text-anchor="start" x="30" y="170">BL1</text><text font-family="Arial" font-size="8px" text-anchor="start" x="80" y="170">Boulon pivot D16mm</text><text font-family="Arial" font-size="8px" text-anchor="start" x="380" y="170">8</text><text font-family="Arial" font-size="8px" text-anchor="start" x="420" y="170">Classe 8.8, L~45mm</text><text font-family="Arial" font-size="8px" text-anchor="start" x="560" y="170">D16 + rondelles + ecrou Nylstop</text><text font-family="Arial" font-size="8px" text-anchor="start" x="30" y="190">RO</text><text font-family="Arial" font-size="8px" text-anchor="start" x="80" y="190">Rondelle plate large</text><text font-family="Arial" font-size="8px" text-anchor="start" x="380" y="190">16</text><text font-family="Arial" font-size="8px" text-anchor="start" x="420" y="190">Acier zingue, D16</text><text font-family="Arial" font-size="8px" text-anchor="start" x="560" y="190">Entre tole et tube, entre tube et ecrou</text><text font-family="Arial" font-size="8px" text-anchor="start" x="30" y="210">CH</text><text font-family="Arial" font-size="8px" text-anchor="start" x="80" y="210">Cheville chimique M12</text><text font-family="Arial" font-size="8px" text-anchor="start" x="380" y="210">12</text><text font-family="Arial" font-size="8px" text-anchor="start" x="420" y="210">Fischer FIS V ou equiv.</text><text font-family="Arial" font-size="8px" text-anchor="start" x="560" y="210">Fixation fond platine murale (6/platine)</text><text font-family="Arial" font-size="8px" text-anchor="start" x="30" y="230">BL2</text><text font-family="Arial" font-size="8px" text-anchor="start" x="80" y="230">Boulon traversant M8</text><text font-family="Arial" font-size="8px" text-anchor="start" x="380" y="230">18</text><text font-family="Arial" font-size="8px" text-anchor="start" x="420" y="230">Classe 8.8 + Nylstop</text><text font-family="Arial" font-size="8px" text-anchor="start" x="560" y="230">Fixation fond platine porte (9/platine)</text><text font-family="Arial" font-size="8px" text-anchor="start" x="30" y="250">BT</text><text font-family="Arial" font-size="8px" text-anchor="start" x="80" y="250">Butee reglable</text><text font-family="Arial" font-size="8px" text-anchor="start" x="380" y="250">2</text><text font-family="Arial" font-size="8px" text-anchor="start" x="420" y="250">Boulon M12x40 + contre-ecrou</text><text font-family="Arial" font-size="8px" text-anchor="start" x="560" y="250">+ tampon EPDM 5mm</text><line stroke="black" stroke-width="0.5" x1="20" x2="880" y1="260" y2="260" /><text fill="#555" font-family="Arial" font-size="9px" text-anchor="middle" x="450.0" y="285">Design simplifie: 4 types de pieces seulement (platine murale, platine porte, bras long, bras court)</text><text fill="#555" font-family="Arial" font-size="9px" text-anchor="middle" x="450.0" y="300">Traitement surface: galvanisation a chaud ou peinture epoxy 2 composants</text></svg>